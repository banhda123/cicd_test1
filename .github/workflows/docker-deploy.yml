name: Docker Build and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: lms-backend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./lms-backend
      run: npm ci
      
    - name: Create test environment file
      working-directory: ./lms-backend
      run: |
        cp .env.example .env
        echo "PORT=3000" >> .env
        echo "ALLOWED_ORIGINS=http://localhost:3000" >> .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_USER=test" >> .env
        echo "DB_PASSWORD=test" >> .env
        echo "DB_NAME=test" >> .env
        echo "JWT_SECRET=test_secret_for_ci_cd" >> .env
        echo "JWT_EXPIRES_IN=1h" >> .env
        echo "EMAIL_HOST=smtp.gmail.com" >> .env
        echo "EMAIL_PORT=587" >> .env
        echo "EMAIL_USER=test@example.com" >> .env
        echo "EMAIL_PASSWORD=test" >> .env
        echo "EMAIL_FROM_NAME=Test" >> .env
        echo "NODE_ENV=test" >> .env
        
    - name: Start test database
      run: |
        docker run -d --name test-db -e MYSQL_ROOT_PASSWORD=test -e MYSQL_DATABASE=test -e MYSQL_USER=test -e MYSQL_PASSWORD=test -p 3306:3306 mysql:8.0
        sleep 30
        
    - name: Initialize test database
      working-directory: ./lms-backend
      run: |
        # Wait for database to be ready
        until docker exec test-db mysqladmin ping -h"localhost" --silent; do
          echo 'Waiting for database...'
          sleep 2
        done
        
        # Create database first
        docker exec test-db mysql -uroot -ptest -e "CREATE DATABASE IF NOT EXISTS test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
        
        # Check if database exists
        echo "=== Checking databases ==="
        docker exec test-db mysql -uroot -ptest -e "SHOW DATABASES;"
        
        # Initialize database schema line by line with debug
        echo "=== Initializing schema manually ==="
        # Create users table first
        docker exec test-db mysql -uroot -ptest test -e "
        CREATE TABLE IF NOT EXISTS users (
            id INT PRIMARY KEY AUTO_INCREMENT,
            email VARCHAR(255) UNIQUE NOT NULL,
            password VARCHAR(255) NOT NULL,
            name VARCHAR(255),
            username VARCHAR(255) UNIQUE,
            role ENUM('admin', 'instructor', 'student', 'teacher') DEFAULT 'student',
            avatar_url VARCHAR(500),
            isEmailVerified BOOLEAN DEFAULT TRUE,
            isActive BOOLEAN DEFAULT TRUE,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
        );"
        
        # Create categories table
        docker exec test-db mysql -uroot -ptest test -e "
        CREATE TABLE IF NOT EXISTS categories (
            id INT PRIMARY KEY AUTO_INCREMENT,
            name VARCHAR(255) NOT NULL,
            menuSection VARCHAR(255),
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
        );"
        
        # Create courses table
        docker exec test-db mysql -uroot -ptest test -e "
        CREATE TABLE IF NOT EXISTS courses (
            id INT PRIMARY KEY AUTO_INCREMENT,
            title VARCHAR(255) NOT NULL,
            slug VARCHAR(255) UNIQUE NOT NULL,
            description TEXT,
            imageUrl VARCHAR(500),
            level VARCHAR(100),
            price DECIMAL(10,2) DEFAULT 0,
            published BOOLEAN DEFAULT FALSE,
            rating DECIMAL(3,2) DEFAULT 0,
            reviewCount INT DEFAULT 0,
            students INT DEFAULT 0,
            totalLessons INT DEFAULT 0,
            duration VARCHAR(255),
            categoryId INT,
            createdBy INT,
            created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
        );"
        
        # Insert admin user
        docker exec test-db mysql -uroot -ptest test -e "
        INSERT IGNORE INTO users (email, password, name, role, isEmailVerified, isActive) 
        VALUES ('admin@lms.com', '\$2a\$10\$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi', 'Admin User', 'admin', TRUE, TRUE);"
        
        # Verify tables exist
        echo "=== Checking tables ==="
        docker exec test-db mysql -uroot -ptest test -e "SHOW TABLES;" 2>&1
        
        # Test database connection
        echo "=== Testing user table ==="
        docker exec test-db mysql -uroot -ptest test -e "SELECT COUNT(*) FROM users;" 2>&1 || echo "User table test failed"
        
    - name: Run tests with retry and debug
      working-directory: ./lms-backend
      run: |
        # Debug database connection
        echo "=== Database Connection Test ==="
        node -e "
        const db = require('./src/models');
        db.sequelize.authenticate()
          .then(() => console.log('Database connection OK'))
          .catch(err => console.error('Database connection failed:', err.message));
        "
        
        # Run tests with retry mechanism
        for i in {1..3}; do
          echo "Test attempt $i/3"
          if npm test; then
            echo "Tests passed!"
            break
          else
            echo "Tests failed, attempt $i/3"
            if [ $i -eq 3 ]; then
              echo "All test attempts failed"
              exit 1
            fi
            sleep 10
          fi
        done
      
    - name: Stop test database
      if: always()
      run: docker stop test-db && docker rm test-db

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./lms-backend
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy to production
      run: |
        echo "Deploying to production..."
        echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        # Add your deployment commands here
        # Example: kubectl set image deployment/lms-backend lms-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        # Or: docker-compose pull && docker-compose up -d
